name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          cache: npm

      - name: Require tag and package versions to match
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          package_version="$(node --input-type=module -e "import pkg from './package.json' with { type: 'json' }; process.stdout.write(pkg.version)")"
          if [ "$RELEASE_TAG" != "v$package_version" ]; then
            echo "::error title=Release version mismatch::Tag $RELEASE_TAG must match package.json version v$package_version."
            exit 1
          fi

      - name: Require the release commit on main
        run: |
          git fetch --no-tags origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck, test, and build
        run: npm run check

      - name: Verify distributable CLI
        run: npm run check:package

      - name: Build release archive and checksum
        run: |
          mkdir -p release
          npm pack --pack-destination release
          npm sbom --sbom-format cyclonedx > release/sbom.cdx.json
          cd release
          sha256sum ./*.tgz > SHA256SUMS.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error title=Immutable release::Release $RELEASE_TAG already exists; publish a new version instead of replacing assets."
            exit 1
          fi
          gh release create "$RELEASE_TAG" release/* --verify-tag --generate-notes --title "$RELEASE_TAG"
