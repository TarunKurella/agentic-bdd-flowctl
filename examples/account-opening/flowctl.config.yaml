version: 1

project:
  name: account-opening-fixture
  root: .

sources:
  frontend:
    - frontend/src
  backend:
    - backend/src/main/java
  include:
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.java"
  exclude:
    - "**/node_modules/**"
    - "**/dist/**"
    - "**/build/**"

graphify:
  graph: graphify-out/graph.json
  required: false

wiki:
  paths:
    - llm-wiki
  required: false

analysis:
  entryRoutes:
    - /applications/new
  includeHttpMethods:
    - POST
  transparentComponents: []
  maxPathDepth: 30
  maxStateVisits: 2

output:
  directory: .flowctl

data:
  applicationDataFile: .flowctl/application-data.local.yaml

runtime:
  baseUrl: http://localhost:3000
  environment: local
  adapterManifest: runtime/adapters.json
